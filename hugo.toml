baseURL = 'https://Amore-H.github.io/'
defaultContentLanguage = 'zh'
locale = 'zh-cn'
title = "The Blog of GUI"
theme = "PaperMod"

[outputs]
  home = ["HTML", "RSS", "JSON"]

# 启用数学公式（KaTeX/MathJax）与内联 HTML 支持
[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  codeFences = true
  guessSyntax = true
  lineNos = true
  noClasses = false

[params]
  env = "production"
  defaultTheme = "auto"
  showReadingTime = true
  showShareButtons = true
  showPostNavLinks = true
  showBreadcrumbs = true
  showCodeCopyButtons = true
  showToc = true
  tocOpen = false
  shareButtons = ["x", "linkedin"]
  # 开启数学公式全局支持
  math = true

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/Amore-H"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[params.homeInfoParams]
  title = "我的技术与学习博客"
  content = "记录技术、学习与实践过程。"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 40

[[menu.main]]
  identifier = "study"
  name = "学习"
  url = "/study/"
  weight = 15
