baseURL = 'https://Amore-H.github.io/'
defaultContentLanguage = 'zh'
locale = 'zh-cn'
title = 'The Blog of GUI'
THEME = 'PAPERMOD'

[OUTPUTS]
HOME = ["HTML", "RSS", "JSON"]

# 启用数学公式（KATEX/MATHJAX）与内联 HTML 支持
[MARKUP.GOLDMARK.RENDERER]
UNSAFE = TRUE

[MARKUP.HIGHLIGHT]
CODEFENCES = TRUE
GUESSSYNTAX = TRUE
LINENOS = TRUE
NOCLASSES = FALSE

[PARAMS]
  ENV = "PRODUCTION"
  DEFAULTTHEME = "AUTO"
  SHOWREADINGTIME = TRUE
  SHOWSHAREBUTTONS = TRUE
  SHOWPOSTNAVLINKS = TRUE
  SHOWBREADCRUMBS = TRUE
  SHOWCODECOPYBUTTONS = TRUE
  SHOWTOC = TRUE
  TOCOPEN = FALSE
  SHAREBUTTONS = ["X", "LINKEDIN"]
  # 开启数学公式全局支持
  MATH = TRUE

[[PARAMS.SOCIALICONS]]
  NAME = "GITHUB"
  URL = "HTTPS://GITHUB.COM/AMORE-H"

[[PARAMS.SOCIALICONS]]
  NAME = "RSS"
  URL = "/INDEX.XML"

[PARAMS.HOMEINFOPARAMS]
  TITLE = "我的技术与学习博客"
  CONTENT = "记录技术、学习与实践过程。"

[PARAMS.FUSEOPTS]
  ISCASESENSITIVE = FALSE
  SHOULDSORT = TRUE
  LOCATION = 0
  DISTANCE = 1000
  THRESHOLD = 0.4
  MINMATCHCHARLENGTH = 0
  KEYS = ["TITLE", "PERMALINK", "SUMMARY", "CONTENT"]

[[MENU.MAIN]]
  IDENTIFIER = "POSTS"
  NAME = "文章"
  URL = "/POSTS/"
  WEIGHT = 10

[[MENU.MAIN]]
  IDENTIFIER = "ARCHIVES"
  NAME = "归档"
  URL = "/ARCHIVES/"
  WEIGHT = 20

[[MENU.MAIN]]
  IDENTIFIER = "TAGS"
  NAME = "标签"
  URL = "/TAGS/"
  WEIGHT = 30

[[MENU.MAIN]]
  IDENTIFIER = "SEARCH"
  NAME = "搜索"
  URL = "/SEARCH/"
  WEIGHT = 40
